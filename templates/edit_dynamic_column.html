{% extends 'base.html' %}

{% block content %}
<!-- قسم تحرير العمود الديناميكي -->
<section class="mb-4">
    <h2 class="section-title">
        <i class="fas fa-edit me-2 icon-primary"></i>
        تحرير العمود الديناميكي
    </h2>
    
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-columns me-2"></i>
                    تحرير العمود: {{ column.display_name }}
                </div>
                <div class="card-body">
                    <form action="{{ url_for('edit_dynamic_column', column_id=column.id) }}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label">اسم العمود (بالإنجليزية)</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ column.name }}" readonly>
                            <div class="form-text text-warning">لا يمكن تغيير اسم العمود بعد الإنشاء</div>
                        </div>
                        <div class="mb-3">
                            <label for="display_name" class="form-label">اسم العرض</label>
                            <input type="text" class="form-control" id="display_name" name="display_name" value="{{ column.display_name }}" required>
                            <div class="form-text">الاسم الذي سيظهر في الجداول والتقارير</div>
                        </div>
                        <div class="mb-3">
                            <label for="data_type" class="form-label">نوع البيانات</label>
                            <input type="text" class="form-control" id="data_type" value="{% if column.data_type == 'text' %}نص{% elif column.data_type == 'number' %}رقم{% elif column.data_type == 'date' %}تاريخ{% elif column.data_type == 'boolean' %}نعم/لا{% elif column.data_type == 'select' %}قائمة اختيار{% endif %}" readonly>
                            <div class="form-text text-warning">لا يمكن تغيير نوع البيانات بعد الإنشاء</div>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('dynamic_columns') }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-2"></i>
                                العودة
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>
                                حفظ التغييرات
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
