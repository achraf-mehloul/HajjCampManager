{% extends 'base.html' %}

{% block title %}إعدادات اللغة{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">{{ translate('إعدادات اللغة', get_setting('language', 'ar')) }}</h5>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('set_language') }}" method="post">
                        <div class="mb-3">
                            <label for="language" class="form-label">{{ translate('لغة العرض', get_setting('language', 'ar')) }}</label>
                            <select class="form-select" id="language" name="language">
                                <option value="ar" {% if get_setting('language', 'ar') == 'ar' %}selected{% endif %}>العربية</option>
                                <option value="en" {% if get_setting('language', 'ar') == 'en' %}selected{% endif %}>English</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">{{ translate('حفظ', get_setting('language', 'ar')) }}</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
