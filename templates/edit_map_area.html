{% extends 'base.html' %}

{% block content %}
<!-- قسم تحرير منطقة الخريطة -->
<section class="mb-4">
    <h2 class="section-title">
        <i class="fas fa-draw-polygon me-2 icon-primary"></i>
        تحرير منطقة الخريطة
    </h2>
    
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-edit me-2"></i>
                    تحرير منطقة: {{ area.name }}
                </div>
                <div class="card-body">
                    <form action="{{ url_for('edit_map_area', area_id=area.id) }}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label">اسم المنطقة</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ area.name }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">وصف المنطقة</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ area.description }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label for="color" class="form-label">لون المنطقة</label>
                            <div class="input-group">
                                <input type="color" class="form-control form-control-color" id="color" name="color" value="{{ area.color }}" title="اختر لون المنطقة">
                                <input type="text" class="form-control" id="color-text" value="{{ area.color }}" readonly>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الإحداثيات</label>
                            <div class="form-control" style="height: auto; min-height: 100px; direction: ltr; font-family: monospace; overflow-x: auto; white-space: pre;">{{ area.coordinates }}</div>
                            <div class="form-text">لا يمكن تعديل الإحداثيات مباشرة. لتغيير الإحداثيات، يرجى استيراد ملف جديد.</div>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('map_areas') }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-2"></i>
                                العودة
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>
                                حفظ التغييرات
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-map me-2"></i>
                    معاينة المنطقة
                </div>
                <div class="card-body">
                    <div id="preview-map" style="height: 400px; border-radius: 10px;"></div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<!-- Leaflet للخرائط -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // تحديث حقل النص عند تغيير اللون
        const colorInput = document.getElementById('color');
        const colorText = document.getElementById('color-text');
        
        colorInput.addEventListener('input', function() {
            colorText.value = this.value;
        });
        
        // إنشاء الخريطة
        const map = L.map('preview-map').setView([24.7136, 46.6753], 12);
        
        // إضافة طبقة الخريطة
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);
        
        // إضافة المنطقة للمعاينة
        try {
            const coordinates = JSON.parse('{{ area.coordinates|safe }}');
            const polygon = L.polygon(coordinates, {
                color: '{{ area.color }}',
                fillColor: '{{ area.color }}',
                fillOpacity: 0.3
            }).addTo(map);
            
            // ضبط حدود الخريطة لتشمل المنطقة
            map.fitBounds(polygon.getBounds());
            
            // تحديث لون المنطقة عند تغيير اللون
            colorInput.addEventListener('input', function() {
                polygon.setStyle({
                    color: this.value,
                    fillColor: this.value
                });
            });
        } catch (e) {
            console.error('خطأ في تحليل الإحداثيات:', e);
        }
    });
</script>
{% endblock %}
