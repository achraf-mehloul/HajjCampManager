{% extends 'base.html' %}

{% block content %}
<!-- قسم إعادة تعيين كلمة المرور -->
<section class="mb-4">
    <h2 class="section-title">
        <i class="fas fa-key me-2 icon-primary"></i>
        إعادة تعيين كلمة المرور
    </h2>
    
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-lock me-2"></i>
                    إعادة تعيين كلمة المرور للمستخدم: {{ user.username }}
                </div>
                <div class="card-body">
                    <form action="{{ url_for('reset_password', user_id=user.id) }}" method="post">
                        <div class="mb-3">
                            <label for="password" class="form-label">كلمة المرور الجديدة</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">تأكيد كلمة المرور</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                            <div id="password-error" class="form-text text-danger" style="display: none;">كلمات المرور غير متطابقة</div>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('users') }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left me-2"></i>
                                العودة
                            </a>
                            <button type="submit" class="btn btn-primary" id="submit-btn">
                                <i class="fas fa-save me-2"></i>
                                حفظ كلمة المرور الجديدة
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm_password');
        const passwordError = document.getElementById('password-error');
        const submitBtn = document.getElementById('submit-btn');
        
        // التحقق من تطابق كلمات المرور
        function validatePassword() {
            if (passwordInput.value !== confirmPasswordInput.value) {
                passwordError.style.display = 'block';
                submitBtn.disabled = true;
                return false;
            } else {
                passwordError.style.display = 'none';
                submitBtn.disabled = false;
                return true;
            }
        }
        
        // إضافة مستمعي الأحداث
        confirmPasswordInput.addEventListener('input', validatePassword);
        passwordInput.addEventListener('input', validatePassword);
        
        // التحقق من النموذج قبل الإرسال
        document.querySelector('form').addEventListener('submit', function(e) {
            if (!validatePassword()) {
                e.preventDefault();
            }
        });
    });
</script>
{% endblock %}
