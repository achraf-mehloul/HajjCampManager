<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="نظام إدارة لوحات التوزيع الكهربائية">
    <meta name="theme-color" content="#B89966">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{{ get_setting('system_name', 'نظام إدارة لوحات التوزيع الكهربائية') }}</title>

    <!-- Bootstrap RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        .language-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .login-header {
            background-color: var(--primary-color);
            padding: 25px;
            text-align: center;
        }

        .login-header img {
            max-width: 150px;
            margin-bottom: 15px;
        }

        .login-body {
            padding: 30px;
            background-color: white;
        }

        .login-title {
            color: var(--white);
            margin-bottom: 0;
            font-weight: bold;
        }

        .login-btn {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            padding: 10px;
            font-weight: bold;
        }

        .login-btn:hover {
            background-color: var(--dark-primary);
            border-color: var(--dark-primary);
        }

        .alerts-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            width: 350px;
        }

        /* RTL/LTR specific styles */
        html[dir="ltr"] .language-toggle {
            right: 20px;
            left: auto;
        }

        html[dir="ltr"] .alerts-container {
            left: 20px;
            right: auto;
        }

        html[dir="ltr"] body {
            direction: ltr;
            text-align: left;
        }
    </style>
</head>
<body>
    <!-- حاوية التنبيهات -->
    <div class="alerts-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <!-- زر تبديل اللغة -->
    <div class="language-toggle">
        <button class="btn btn-sm btn-outline-light" id="toggle-language">
            <span class="ar-text">English</span>
            <span class="en-text" style="display: none;">العربية</span>
        </button>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                {% if get_setting('logo_path') %}
                <img src="{{ url_for('static', filename=get_setting('logo_path')) }}" alt="شعار النظام" class="img-fluid">
                {% else %}
                <i class="fas fa-bolt fa-3x text-white mb-3"></i>
                {% endif %}
                <h3 class="login-title ar-text">تسجيل الدخول</h3>
                <h3 class="login-title en-text" style="display: none;">Login</h3>
            </div>
            <div class="login-body">
                <form method="post" action="{{ url_for('login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label for="username" class="form-label ar-text">اسم المستخدم</label>
                        <label for="username" class="form-label en-text" style="display: none;">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label ar-text">كلمة المرور</label>
                        <label for="password" class="form-label en-text" style="display: none;">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label ar-text" for="remember">تذكرني</label>
                        <label class="form-check-label en-text" style="display: none;" for="remember">Remember me</label>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary login-btn ar-text">تسجيل الدخول</button>
                        <button type="submit" class="btn btn-primary login-btn en-text" style="display: none;">Login</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $(document).ready(function() {
            // تبديل اللغة
            $('#toggle-language').click(function() {
                if ($('html').attr('dir') === 'rtl') {
                    // تبديل إلى اللغة الإنجليزية
                    $('html').attr('dir', 'ltr');
                    $('.ar-text').hide();
                    $('.en-text').show();
                } else {
                    // تبديل إلى اللغة العربية
                    $('html').attr('dir', 'rtl');
                    $('.ar-text').show();
                    $('.en-text').hide();
                }
            });
        });
    </script>
</body>
</html>
