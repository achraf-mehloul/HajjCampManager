{% extends 'base.html' %}
{% block title %}الإرشاد المكاني الذكي{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<style>
    body,
    html {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    .guide-wrap {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        padding-top: 56px;
        background: #0f1923;
    }

    #guide-map {
        flex: 1;
        min-height: 200px;
        z-index: 0;
    }

    /* ─── شريط أعلى الخريطة ─── */
    .top-bar {
        position: absolute;
        top: 65px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1200;
        width: calc(100% - 24px);
        max-width: 620px;
        display: flex;
        gap: 8px;
        align-items: center;
    }

    .search-box {
        flex: 1;
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.97);
        border-radius: 50px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, .35);
        overflow: hidden;
        backdrop-filter: blur(8px);
    }

    #guide-input {
        flex: 1;
        border: none;
        padding: 14px 18px;
        font-size: 1rem;
        outline: none;
        direction: rtl;
        font-family: inherit;
        background: transparent;
        color: #1a1a2e;
    }

    .icon-btn {
        width: 52px;
        height: 52px;
        border: none;
        background: transparent;
        color: #1a237e;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        transition: .2s;
        flex-shrink: 0;
    }

    .icon-btn:hover {
        background: #f0f4ff;
    }

    .icon-btn.mic-active {
        color: #e74c3c;
    }

    .icon-btn.send-btn {
        background: #1a237e;
        color: #fff;
        border-radius: 0 50px 50px 0;
    }

    .icon-btn.send-btn:hover {
        background: #283593;
    }

    .loc-circle {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 4px 16px rgba(0, 0, 0, .25);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #1a237e;
        font-size: 1.1rem;
        transition: .2s;
        flex-shrink: 0;
    }

    .loc-circle:hover {
        background: #e8eaf6;
    }

    /* ─── لوحة AI ─── */
    .ai-panel {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 1100;
        background: rgba(10, 15, 30, 0.95);
        backdrop-filter: blur(12px);
        border-radius: 20px 20px 0 0;
        padding: 16px;
        max-height: 55vh;
        display: flex;
        flex-direction: column;
        transition: max-height .3s ease;
        border-top: 1px solid rgba(255, 255, 255, .08);
    }

    .ai-panel.collapsed {
        max-height: 60px;
        overflow: hidden;
    }

    .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, .08);
        flex-shrink: 0;
    }

    .panel-title {
        font-size: 0.9rem;
        font-weight: 600;
        color: #7986cb;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .panel-toggle {
        color: #7986cb;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .voice-mode-btn {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        padding: 4px 10px;
        font-size: 0.75rem;
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: 0.3s;
    }

    .voice-mode-btn.active {
        background: #e74c3c;
        border-color: #e74c3c;
    }

    .start-nav-btn {
        margin: 10px 0;
        width: 100%;
        background: linear-gradient(135deg, #1a237e, #3949ab);
        color: #fff;
        border: none;
        padding: 12px;
        border-radius: 12px;
        font-weight: bold;
        display: none;
        box-shadow: 0 4px 15px rgba(26, 35, 126, 0.4);
        transition: 0.3s;
        cursor: pointer;
    }

    .start-nav-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(26, 35, 126, 0.6);
    }

    .stop-nav-btn {
        margin: 10px 0;
        width: 100%;
        background: linear-gradient(135deg, #c62828, #e53935);
        color: #fff;
        border: none;
        padding: 12px;
        border-radius: 12px;
        font-weight: bold;
        display: none;
        box-shadow: 0 4px 15px rgba(198, 40, 40, 0.4);
        transition: 0.3s;
        cursor: pointer;
    }

    .stop-nav-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(198, 40, 40, 0.6);
    }

    .steps-list {
        overflow-y: auto;
        flex: 1;
        padding-top: 10px;
        scrollbar-width: thin;
        scrollbar-color: #3949ab transparent;
    }

    .ai-bubble {
        background: linear-gradient(135deg, #1a237e22, #3949ab33);
        border: 1px solid #3949ab55;
        border-radius: 12px;
        padding: 12px 16px;
        margin-bottom: 10px;
        font-size: 0.92rem;
        line-height: 1.7;
        color: #e8eaf6;
        direction: rtl;
        text-align: right;
    }

    .step-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, .06);
        direction: rtl;
        color: #b0bec5;
        font-size: 0.88rem;
    }

    .step-row:last-child {
        border-bottom: none;
    }

    .step-num {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #1a237e;
        color: #fff;
        font-size: 0.75rem;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    /* ─── AI Chat mini ─── */
    .ai-chat-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-shrink: 0;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, .08);
    }

    .ai-chat-input {
        flex: 1;
        background: rgba(255, 255, 255, .05);
        border: 1px solid rgba(255, 255, 255, .12);
        border-radius: 24px;
        padding: 8px 16px;
        color: #e8eaf6;
        font-size: 0.9rem;
        outline: none;
        direction: rtl;
        font-family: inherit;
    }

    .ai-chat-send {
        background: #1a237e;
        border: none;
        border-radius: 50%;
        width: 38px;
        height: 38px;
        color: #fff;
        cursor: pointer;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .ai-chat-send:hover {
        background: #283593;
    }

    /* ─── Toast ─── */
    .toast-msg {
        position: absolute;
        top: 130px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1300;
        padding: 10px 22px;
        background: rgba(0, 0, 0, .82);
        color: #fff;
        border-radius: 30px;
        font-size: .88rem;
        display: none;
        white-space: nowrap;
        backdrop-filter: blur(4px);
    }

    .toast-msg.show {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .spin {
        width: 16px;
        height: 16px;
        border: 2px solid #fff;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin .7s linear infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    /* speaker button */
    .speak-btn {
        background: none;
        border: none;
        color: #7986cb;
        cursor: pointer;
        font-size: 0.85rem;
        padding: 2px 6px;
        border-radius: 6px;
    }

    .speak-btn:hover {
        background: rgba(121, 134, 203, .15);
    }
</style>
{% endblock %}

{% block content %}
<div class="guide-wrap">
    <div id="guide-map"></div>

    <!-- شريط البحث -->
    <div class="top-bar">
        <div class="search-box">
            <input type="text" id="guide-input" placeholder="وجهني للمسجد الحرام، جمرة العقبة،..." autocomplete="off">
            <button type="button" class="icon-btn" id="mic-btn" title="تحدث">
                <i class="fas fa-microphone"></i>
            </button>
            <button type="button" class="icon-btn send-btn" onclick="doGuide()" title="ابحث">
                <i class="fas fa-arrow-left"></i>
            </button>
        </div>
        <button type="button" class="loc-circle" id="loc-btn" title="موقعي">
            <i class="fas fa-location-crosshairs"></i>
        </button>
    </div>

    <!-- Toast -->
    <div class="toast-msg" id="toast"></div>

    <!-- لوحة AI -->
    <div class="ai-panel" id="ai-panel">
        <div class="panel-header">
            <span class="panel-title" id="panel-header-click">
                <i class="fas fa-route"></i>
                <span id="panel-label">الإرشادات الذكية</span>
            </span>
            <div class="panel-toggle">
                <button id="voice-mode-toggle" class="voice-mode-btn" title="تفعيل الرد الصوتي الآلي">
                    <i class="fas fa-volume-up"></i>
                    وضع الصوت: <span id="voice-status">معطل</span>
                </button>
                <i class="fas fa-chevron-down" id="toggle-icon"></i>
            </div>
        </div>
        <button id="start-nav-btn" class="start-nav-btn">
            <i class="fas fa-location-arrow" style="margin-left:8px"></i>بدء الملاحة الآن
        </button>
        <button id="stop-nav-btn" class="stop-nav-btn">
            <i class="fas fa-stop" style="margin-left:8px"></i>إيقاف الملاحة
        </button>
        <div class="steps-list" id="steps-content">
            <div style="color:#7986cb; font-size:.88rem; text-align:center; padding:20px">
                <i class="fas fa-map-marked-alt" style="font-size:2rem; margin-bottom:10px; display:block"></i>
                اكتب اسم المكان أو تكلم وسيوجهك الذكاء الاصطناعي
            </div>
        </div>
        <!-- AI Chat -->
        <div class="ai-chat-row">
            <input type="text" class="ai-chat-input" id="ai-chat-input" placeholder="اسأل عن الطريق أو أي مكان..."
                dir="rtl">
            <button class="ai-chat-send" id="ai-mic-chat" title="صوت">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="ai-chat-send" onclick="sendAIChat()" title="إرسال">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
    (function () {
        let map, userMarker, destMarker, routeLayer;
        let userLat = 21.4225, userLng = 39.8262;
        let panelCollapsed = false;
        let voiceMode = false;
        let isNavigating = false;
        let currentSteps = [];
        let nextStepIndex = 0;
        let watchId = null;

        // ─── خريطة ───
        function initMap() {
            map = L.map('guide-map', { zoomControl: false }).setView([userLat, userLng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© CartoDB © OpenStreetMap'
            }).addTo(map);
            L.control.zoom({ position: 'topright' }).addTo(map);
            routeLayer = L.layerGroup().addTo(map);
            getUserLocation();
        }

        function getUserLocation() {
            if (!navigator.geolocation) return;

            if (watchId) navigator.geolocation.clearWatch(watchId);

            const success = pos => {
                userLat = pos.coords.latitude;
                userLng = pos.coords.longitude;
                updateUserMarker();
                if (isNavigating) checkProximityToNextStep();
            };

            const error = err => { console.error("Location error:", err); };

            watchId = navigator.geolocation.watchPosition(success, error, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });

            navigator.geolocation.getCurrentPosition(success, error);
        }

        function updateUserMarker() {
            if (userMarker) {
                userMarker.setLatLng([userLat, userLng]);
            } else {
                userMarker = L.circleMarker([userLat, userLng], {
                    radius: 8, fillColor: '#5c6bc0', fillOpacity: 1,
                    color: '#fff', weight: 3
                }).addTo(map).bindPopup('أنت هنا');
            }
            if (!isNavigating) map.setView([userLat, userLng], 15);
        }

        document.getElementById('loc-btn').addEventListener('click', getUserLocation);

        // ─── Voice Mode Toggle ───
        document.getElementById('voice-mode-toggle').addEventListener('click', (e) => {
            e.stopPropagation();
            voiceMode = !voiceMode;
            const btn = document.getElementById('voice-mode-toggle');
            const status = document.getElementById('voice-status');
            if (voiceMode) {
                btn.classList.add('active');
                status.textContent = 'مفعل';
                speak("تم تفعيل وضع الصوت التلقائي");
            } else {
                btn.classList.remove('active');
                status.textContent = 'معطل';
                speechSynthesis.cancel();
            }
        });

        // ─── Panel ───
        document.getElementById('panel-header-click').addEventListener('click', () => {
            panelCollapsed = !panelCollapsed;
            document.getElementById('ai-panel').classList.toggle('collapsed', panelCollapsed);
            document.getElementById('toggle-icon').className = panelCollapsed
                ? 'fas fa-chevron-up panel-toggle'
                : 'fas fa-chevron-down panel-toggle';
        });

        // ─── Toast ───
        function showToast(msg, spin) {
            const t = document.getElementById('toast');
            t.innerHTML = (spin ? '<span class="spin"></span>' : '') + msg;
            t.classList.add('show');
        }
        function hideToast() { document.getElementById('toast').classList.remove('show'); }

        // ─── رسم المسار ───
        function drawRoute(geojson) {
            routeLayer.clearLayers();
            if (!geojson || !geojson.coordinates || geojson.coordinates.length < 2) return;
            const latlngs = geojson.coordinates.map(c => [c[1], c[0]]);
            L.polyline(latlngs, {
                color: '#5c6bc0', weight: 6, opacity: 0.85,
                dashArray: null, lineCap: 'round', lineJoin: 'round'
            }).addTo(routeLayer);
            // Animated dots
            L.polyline(latlngs, {
                color: '#7986cb', weight: 3, opacity: 0.5,
                dashArray: '1, 12'
            }).addTo(routeLayer);
            map.fitBounds(latlngs, { padding: [80, 80] });
        }

        function setDest(lat, lng, name) {
            if (destMarker) map.removeLayer(destMarker);
            destMarker = L.marker([lat, lng], {
                icon: L.divIcon({
                    className: '',
                    html: '<div style="background:#e53935;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;"><i class="fas fa-location-dot" style="color:#fff;font-size:10px"></i></div>',
                    iconSize: [20, 20], iconAnchor: [10, 10]
                })
            }).addTo(map).bindPopup(`<b>${name || 'الوجهة'}</b>`).openPopup();
        }

        // ─── TTS ───
        function speak(text) {
            if (!window.speechSynthesis || !text) return;
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ar-SA'; u.rate = 1.0; u.pitch = 1.0;

            // Try to find a good Arabic voice
            const voices = speechSynthesis.getVoices();
            let voice = voices.find(v => v.lang.includes('ar-SA')) || voices.find(v => v.lang.includes('ar'));
            if (voice) u.voice = voice;

            speechSynthesis.speak(u);
        }

        // ─── Guide Main ───
        function doGuide() {
            const msg = (document.getElementById('guide-input').value || '').trim();
            if (!msg) { showToast('اكتب المكان أو تكلم'); setTimeout(hideToast, 2500); return; }
            showToast('جاري البحث وفهم طلبك...', true);
            isNavigating = false;
            document.getElementById('start-nav-btn').style.display = 'none';

            fetch('{{ url_for("trips_ai.api_smart_spatial_guide") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token() }}' },
                body: JSON.stringify({ message: msg, origin_lat: userLat, origin_lng: userLng })
            })
                .then(r => r.json())
                .then(data => {
                    hideToast();
                    if (!data.success) {
                        showToast('⚠️ ' + (data.error || 'حدث خطأ'));
                        setTimeout(hideToast, 4000);
                        return;
                    }
                    if (data.route_geojson) drawRoute(data.route_geojson);
                    setDest(data.lat, data.lng, data.display_name);

                    currentSteps = data.steps || [];
                    nextStepIndex = 0;

                    // عرض الخطوات
                    let html = `<div class="ai-bubble">
                <i class="fas fa-robot" style="color:#7986cb; margin-left:6px"></i>
                ${(data.ai_message || '').replace(/\n/g, '<br>')}
                <button class="speak-btn" onclick='window.speak(${JSON.stringify(data.ai_message || "").replace(/'/g, "&#39;")})'>
                    <i class="fas fa-volume-up"></i>
                </button>
            </div>`;
                    if (currentSteps && currentSteps.length) {
                        document.getElementById('start-nav-btn').style.display = 'block';
                        html += currentSteps.slice(0, 15).map((s, i) =>
                            `<div class="step-row" id="step-${i}">
                        <span class="step-num">${i + 1}</span>
                        <span>${s.instruction || s.name || ''}${s.distance ? ' <small style="color:#546e7a">(~' + Math.round(s.distance) + ' م)</small>' : ''}</span>
                    </div>`
                        ).join('');
                    }
                    if (data.directions_url) {
                        html += `<div style="text-align:center; margin-top:10px">
                    <a href="${data.directions_url}" target="_blank" style="color:#7986cb; font-size:.85rem; text-decoration:none">
                        <i class="fas fa-external-link-alt"></i> فتح في خرائط Google
                    </a>
                </div>`;
                    }
                    document.getElementById('steps-content').innerHTML = html;
                    document.getElementById('panel-label').textContent = data.display_name || 'الإرشادات';
                    document.getElementById('ai-panel').classList.remove('collapsed');
                    panelCollapsed = false;

                    if (voiceMode) {
                        speak(data.ai_message || 'وجهتك هي ' + data.display_name + '. اتبع المسار الموضح.');
                    }
                })
                .catch(err => {
                    console.error(err);
                    hideToast();
                    showToast('⚠️ فشل الاتصال بالسيرفر');
                    setTimeout(hideToast, 3000);
                });
        }

        // ─── الملاحة خطوة بخطوة ───
        document.getElementById('start-nav-btn').addEventListener('click', function () {
            isNavigating = true;
            nextStepIndex = 0;
            this.style.display = 'none';
            document.getElementById('stop-nav-btn').style.display = 'block';
            showToast('بدأت الملاحة. سأخبرك بالاتجاهات تلقائياً.', false);
            setTimeout(hideToast, 3000);
            processNextStep();
        });

        document.getElementById('stop-nav-btn').addEventListener('click', function () {
            isNavigating = false;
            this.style.display = 'none';
            document.getElementById('start-nav-btn').style.display = 'block';
            showToast('تم إيقاف الملاحة', false);
            setTimeout(hideToast, 2000);

            // إعادة تعيين ألوان الخطوات
            document.querySelectorAll('.step-row').forEach(r => {
                r.style.color = '#b0bec5';
                r.style.background = 'transparent';
            });
        });

        function processNextStep() {
            if (!isNavigating || nextStepIndex >= currentSteps.length) {
                if (nextStepIndex >= currentSteps.length) {
                    isNavigating = false;
                    document.getElementById('stop-nav-btn').style.display = 'none';
                    document.getElementById('start-nav-btn').style.display = 'block';
                    speak("لقد وصلت إلى وجهتك.");
                    showToast("وصلت بالسلامة!", false);
                }
                return;
            }

            const step = currentSteps[nextStepIndex];
            const instruction = step.instruction || step.name;

            document.querySelectorAll('.step-row').forEach(r => {
                r.style.color = '#b0bec5';
                r.style.background = 'transparent';
            });
            const stepEl = document.getElementById(`step-${nextStepIndex}`);
            if (stepEl) {
                stepEl.style.color = '#fff';
                stepEl.style.background = 'rgba(255,255,255,0.05)';
                stepEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            if (voiceMode) {
                speak(instruction);
            }

            nextStepIndex++;
        }

        function checkProximityToNextStep() {
            if (!isNavigating || nextStepIndex >= currentSteps.length) return;

            const step = currentSteps[nextStepIndex];
            if (!step.lat || !step.lng) return;

            const dist = getDistance(userLat, userLng, step.lat, step.lng);
            if (dist < 30) {
                processNextStep();
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // metres
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
                Math.cos(φ1) * Math.cos(φ2) *
                Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // ─── AI Chat ───
        function sendAIChat() {
            const inp = document.getElementById('ai-chat-input');
            const msg = inp.value.trim();
            if (!msg) return;
            inp.value = '';
            const content = document.getElementById('steps-content');
            content.innerHTML += `<div class="ai-bubble" style="background: rgba(255,255,255,.03); border-color: rgba(255,255,255,.1);">
            <i class="far fa-user" style="color:#546e7a; margin-left:6px"></i>${msg}
        </div>`;
            content.innerHTML += '<div class="ai-bubble" id="ai-typing"><i class="fas fa-circle-notch fa-spin" style="color:#7986cb"></i> يفكر...</div>';
            content.scrollTop = content.scrollHeight;

            fetch('{{ url_for("trips_ai.api_chat") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token() }}' },
                body: JSON.stringify({ message: msg })
            })
                .then(r => r.json())
                .then(data => {
                    const typing = document.getElementById('ai-typing');
                    if (typing) typing.remove();
                    const resp = data.response || data.error || 'لم أتمكن من الفهم';
                    content.innerHTML += `<div class="ai-bubble">
                <i class="fas fa-robot" style="color:#7986cb; margin-left:6px"></i>
                ${resp.replace(/\n/g, '<br>')}
                <button class="speak-btn" onclick='window.speak(${JSON.stringify(resp).replace(/'/g, "&#39;")})'>
                    <i class="fas fa-volume-up"></i>
                </button>
            </div>`;
                    content.scrollTop = content.scrollHeight;
                    if (voiceMode) speak(resp);
                })
                .catch(() => {
                    const typing = document.getElementById('ai-typing');
                    if (typing) typing.remove();
                });
        }

        // ─── Mic ───
        let activeRecognition = null;

        function startRecognition(onResult) {
            if (activeRecognition) {
                activeRecognition.stop();
                activeRecognition = null;
            }

            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Recognition) {
                showToast('المتصفح لا يدعم التعرف على الصوت. يرجى استخدام متصفح حديث مثل Chrome.');
                setTimeout(hideToast, 4000);
                return;
            }

            const rec = new Recognition();
            rec.lang = 'ar-SA';
            rec.continuous = false;
            rec.interimResults = false;

            rec.onstart = () => {
                showToast('🎤 جاري الاستماع...', false);
            };

            rec.onresult = e => {
                hideToast();
                const text = (e.results[0][0].transcript || '').trim();
                if (text) onResult(text);
            };

            rec.onerror = e => {
                hideToast();
                console.error('Speech recognition error:', e.error);
                if (e.error === 'not-allowed') {
                    showToast('⚠️ يرجى السماح للمتصفح بالوصول للميكروفون');
                } else {
                    showToast('⚠️ تعذر تمييز الصوت. حاول ثانية.');
                }
                setTimeout(hideToast, 3000);
            };

            rec.onend = () => {
                hideToast();
                document.getElementById('mic-btn').classList.remove('mic-active');
                activeRecognition = null;
            };

            rec.start();
            activeRecognition = rec;
        }

        document.getElementById('mic-btn').addEventListener('click', function () {
            if (this.classList.contains('mic-active')) {
                if (activeRecognition) activeRecognition.stop();
                this.classList.remove('mic-active');
                return;
            }
            this.classList.add('mic-active');
            startRecognition(text => {
                if (text) {
                    document.getElementById('guide-input').value = text;
                    doGuide();
                }
            });
        });

        document.getElementById('ai-mic-chat').addEventListener('click', function () {
            startRecognition(text => {
                if (text) {
                    document.getElementById('ai-chat-input').value = text;
                    sendAIChat();
                }
            });
        });

        document.getElementById('guide-input').addEventListener('keydown', e => { if (e.key === 'Enter') doGuide(); });
        document.getElementById('ai-chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendAIChat(); });

        // تحميل أصوات TTS
        if (window.speechSynthesis) speechSynthesis.getVoices();

        initMap();

        // Expose functions to global scope for onclick handlers
        window.doGuide = doGuide;
        window.speak = speak;
        window.sendAIChat = sendAIChat;
    })();
</script>
{% endblock %}
